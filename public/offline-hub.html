<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — Paynter Bar Hub</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    .card { max-width: 360px; }
    .mark {
      width: 84px; height: 84px; margin: 0 auto 24px;
      border: 2px solid #0e7490; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: #0e7490; letter-spacing: 1px;
    }
    h1 { font-size: 22px; margin: 0 0 12px; font-weight: 600; }
    p { font-size: 15px; line-height: 1.55; margin: 0 0 28px; opacity: 0.8; }
    button {
      background: #0e7490; color: #f1f5f9; border: 0; border-radius: 8px;
      padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">PB</div>
    <h1>You're offline</h1>
    <p>The Paynter Bar Hub needs a connection to load live stock, pricing and Square data. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
